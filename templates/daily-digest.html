<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Daily Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; padding: 0; background: transparent; }
    #app { display: inline-block; }
  </style>
</head>
<body>

<div x-data="{
  date: 'April 3, 2026',
  category: 'AI & Technology',
  headline: 'Agents Are Taking Over the Dev Stack',
  summary: 'A wave of autonomous coding agents shipped this week — from cloud IDEs to terminal-native tools — signaling a fundamental shift in how software gets written.',
  insights: [
    { color: '#58a6ff', label: 'Trend',   text: 'Agent-native IDEs now outpace plugin-based tools in GitHub star velocity for the third consecutive month.' },
    { color: '#3fb950', label: 'Signal',  text: 'Model context windows hit 2M tokens; retrieval-augmented workflows are quietly becoming obsolete.' },
    { color: '#d2a8ff', label: 'Opinion', text: 'The real moat is not the model — it is the feedback loop. Whoever closes it fastest wins.' }
  ],
  tags: ['OpenAI', 'Claude', 'Cursor', 'Open Source'],
  readMin: 4
}" id="app">

  <div style="width:520px; background:linear-gradient(160deg,#0d1117 0%,#0d1117 100%); border:1px solid #21262d; border-radius:16px; overflow:hidden; position:relative;">

    <!-- Top accent bar -->
    <div style="height:3px; background:linear-gradient(90deg,#58a6ff 0%,#3fb950 50%,#d2a8ff 100%);"></div>

    <div style="padding:28px 28px 24px;">

      <!-- Header row -->
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
        <div style="display:flex; align-items:center; gap:8px;">
          <!-- AI spark icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/>
          </svg>
          <span style="font-size:11px; font-weight:700; color:#58a6ff; letter-spacing:0.12em; text-transform:uppercase;">AI Daily Digest</span>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <span style="font-size:11px; color:#484f58;" x-text="readMin + ' min read'"></span>
          <span style="font-size:11px; color:#484f58;" x-text="date"></span>
        </div>
      </div>

      <!-- Category chip -->
      <div style="display:inline-flex; align-items:center; background:rgba(88,166,255,0.1); border:1px solid rgba(88,166,255,0.2); border-radius:99px; padding:3px 10px; margin-bottom:14px;">
        <span style="font-size:11px; font-weight:500; color:#58a6ff;" x-text="category"></span>
      </div>

      <!-- Headline -->
      <div style="font-size:22px; font-weight:700; color:#e6edf3; line-height:1.3; letter-spacing:-0.3px; margin-bottom:12px;" x-text="headline"></div>

      <!-- Summary -->
      <div style="font-size:13px; color:#8b949e; line-height:1.7; margin-bottom:24px;" x-text="summary"></div>

      <!-- Divider -->
      <div style="height:1px; background:#21262d; margin-bottom:20px;"></div>

      <!-- Key insights -->
      <div style="font-size:11px; font-weight:600; color:#484f58; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:14px;">Key Insights</div>
      <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:24px;">
        <template x-for="(item, i) in insights" :key="i">
          <div style="display:flex; gap:12px; align-items:flex-start;">
            <!-- Dot + label -->
            <div style="display:flex; align-items:center; gap:6px; flex-shrink:0; width:72px; padding-top:1px;">
              <div style="width:6px; height:6px; border-radius:50%; flex-shrink:0;" :style="'background:' + item.color"></div>
              <span style="font-size:11px; font-weight:600; letter-spacing:0.04em;" :style="'color:' + item.color" x-text="item.label"></span>
            </div>
            <div style="font-size:13px; color:#c9d1d9; line-height:1.6;" x-text="item.text"></div>
          </div>
        </template>
      </div>

      <!-- Footer: tags + generated badge -->
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <template x-for="tag in tags" :key="tag">
            <span style="font-size:11px; font-weight:500; color:#8b949e; background:rgba(255,255,255,0.04); border:1px solid #30363d; border-radius:6px; padding:3px 8px;" x-text="tag"></span>
          </template>
        </div>
        <div style="display:flex; align-items:center; gap:5px; opacity:0.5;">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/>
          </svg>
          <span style="font-size:10px; color:#8b949e; letter-spacing:0.06em;">GENERATED BY AI</span>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
